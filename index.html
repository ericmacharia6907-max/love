<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Programmed Love</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: Arial, Helvetica, sans-serif;
    }

    .scene {
      position: fixed;
      /* respect safe areas on all sides */
      top: env(safe-area-inset-top, 0px);
      bottom: env(safe-area-inset-bottom, 0px);
      left: env(safe-area-inset-left, 0px);
      right: env(safe-area-inset-right, 0px);
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
    }

    .heart-container {
      position: relative;
      width: 0;
      height: 0;
    }

    .word {
      position: absolute;
      left: 0;
      top: 0;
      transform: translate(
        calc(var(--x) - 50%),
        calc(var(--y) - 50%)
      );
      pointer-events: none;
      user-select: none;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .word > span {
      display: inline-block;
      white-space: nowrap;
      font-size: 8px;
      font-weight: 700;
      letter-spacing: 0.2px;
      color: #ea80b0;
      transform-origin: center center;

      text-shadow:
        0 0  4px #ffffff,
        0 0  8px #ffffff,
        0 0 16px rgba(234, 128, 176, 0.85),
        0 0 28px rgba(234, 128, 176, 0.45);

      animation: selfSpin 6s linear infinite;
      animation-delay: calc(var(--i) * -50ms);
    }

    @keyframes selfSpin {
      from { transform: rotate(0deg);   }
      to   { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="scene">
    <div class="heart-container" id="heart"></div>
  </div>

  <script>
    const heart = document.getElementById('heart');
    const COUNT = 120;

    // Get safe area values
    const style = getComputedStyle(document.documentElement);
    const safeTop    = parseInt(style.getPropertyValue('env(safe-area-inset-top)')    || 0);
    const safeBottom = parseInt(style.getPropertyValue('env(safe-area-inset-bottom)') || 0);
    const safeLeft   = parseInt(style.getPropertyValue('env(safe-area-inset-left)')   || 0);
    const safeRight  = parseInt(style.getPropertyValue('env(safe-area-inset-right)')  || 0);

    // Available space after safe areas
    const availW = window.innerWidth  - safeLeft - safeRight  - 40; // 40px extra padding
    const availH = window.innerHeight - safeTop  - safeBottom - 40;
    const smallest = Math.min(availW, availH);

    // Heart max extent is ~17 units
    // Use 35% of available space
    const SCALE = (smallest * 0.35) / 17;

    for (let i = 1; i <= COUNT; i++) {
      const t = (i / COUNT) * Math.PI * 2;

      const x = 16 * Math.pow(Math.sin(t), 3);
      const y =
        13 * Math.cos(t) -
         5 * Math.cos(2 * t) -
         2 * Math.cos(3 * t) -
             Math.cos(4 * t);

      const wrapper = document.createElement('div');
      wrapper.className = 'word';
      wrapper.style.setProperty('--i', i);
      wrapper.style.setProperty('--x', `${x * SCALE}px`);
      wrapper.style.setProperty('--y', `${-y * SCALE}px`);

      const inner = document.createElement('span');
      inner.textContent = 'I love you';

      wrapper.appendChild(inner);
      heart.appendChild(wrapper);
    }
  </script>
</body>
</html>
