<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Programmed Love</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: Arial, Helvetica, sans-serif;
    }

    .scene {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
    }

    .heart-container {
      position: relative;
      width: 0;
      height: 0;
    }

    /*
      The WRAPPER stays fixed on the heart curve.
      It only handles position — no animation.
    */
    .word {
      position: absolute;
      left: 0;
      top: 0;
      transform: translate(var(--x), var(--y));
      pointer-events: none;
      user-select: none;
    }

    /*
      The INNER span spins on its own axis.
      It does NOT affect the wrapper position.
    */
    .word > span {
      display: inline-block;
      white-space: nowrap;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.4px;
      color: #ea80b0;
      transform-origin: center center;

      text-shadow:
        0 0  6px #ffffff,
        0 0 12px #ffffff,
        0 0 24px rgba(234, 128, 176, 0.85),
        0 0 40px rgba(234, 128, 176, 0.45);

      animation: selfSpin 6s linear infinite;
      animation-delay: calc(var(--i) * -50ms);
    }

    /*
      Full 360° rotation around each word's own center.
      The word spins in place.
      The heart shape doesn't move at all.
    */
    @keyframes selfSpin {
      from { transform: rotate(0deg);   }
      to   { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="scene">
    <div class="heart-container" id="heart"></div>
  </div>

  <script>
    const heart = document.getElementById('heart');
    const COUNT = 120;
    const SCALE = 20;

    for (let i = 1; i <= COUNT; i++) {
      const t = (i / COUNT) * Math.PI * 2;

      // Heart parametric equations
      const x = 16 * Math.pow(Math.sin(t), 3);
      const y =
        13 * Math.cos(t) -
         5 * Math.cos(2 * t) -
         2 * Math.cos(3 * t) -
             Math.cos(4 * t);

      // Wrapper — fixed position on heart curve
      const wrapper = document.createElement('div');
      wrapper.className = 'word';
      wrapper.style.setProperty('--i', i);
      wrapper.style.setProperty('--x', `${x * SCALE}px`);
      wrapper.style.setProperty('--y', `${-y * SCALE}px`);

      // Inner span — this is what spins
      const inner = document.createElement('span');
      inner.textContent = 'I love you';

      wrapper.appendChild(inner);
      heart.appendChild(wrapper);
    }
  </script>
</body>
</html>
